<svg width="100%" viewBox="0 0 720 460" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ローカル vs 本番 アーキテクチャ図</title>
  <desc>開発時はフロント(:5173)とバック(:8787)が分離しプロキシで通信。本番はCloudflare Worker一本で配信。</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="720" height="460" rx="16" fill="#faf8f2"/>

  <!-- ===== LEFT: LOCAL ===== -->
  <!-- panel -->
  <rect x="20" y="16" width="320" height="428" rx="12" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <rect x="20" y="16" width="320" height="38" rx="12" fill="#3a7bd5"/>
  <rect x="20" y="38" width="320" height="16" fill="#3a7bd5"/>
  <text x="180" y="40" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">開発環境（ローカル）</text>

  <!-- Browser box -->
  <rect x="90" y="68" width="140" height="44" rx="8" fill="#fff" stroke="#3a7bd5" stroke-width="1.2"/>
  <text x="160" y="87" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#1a4a80">ブラウザ</text>
  <text x="160" y="103" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#3a7bd5">localhost:5173</text>

  <!-- arrow down to front -->
  <line x1="160" y1="112" x2="160" y2="136" stroke="#3a7bd5" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="168" y="128" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6b6453">fetch /api/*</text>

  <!-- Front box -->
  <rect x="60" y="137" width="200" height="58" rx="8" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
  <text x="160" y="158" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#085450">フロント</text>
  <text x="160" y="174" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#0d9488">Vite + React  :5173</text>
  <text x="160" y="187" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0f766e">HMR で即時反映</text>

  <!-- proxy arrow -->
  <line x1="160" y1="195" x2="160" y2="221" stroke="#6b6453" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arr-gray)"/>
  <rect x="88" y="204" width="145" height="16" rx="4" fill="#f3efe4"/>
  <text x="161" y="215" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#7a4f2a">vite.config.ts proxy</text>

  <!-- Back box -->
  <rect x="60" y="222" width="200" height="58" rx="8" fill="#fff3e2" stroke="#d97706" stroke-width="1.2"/>
  <text x="160" y="243" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#7a3d00">バック（API）</text>
  <text x="160" y="259" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#d97706">Hono + Workers  :8787</text>
  <text x="160" y="272" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#a05c00">wrangler dev</text>

  <!-- arrow to local DB -->
  <line x1="160" y1="280" x2="160" y2="306" stroke="#d97706" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Local DB box -->
  <rect x="60" y="307" width="200" height="58" rx="8" fill="#f0ebf8" stroke="#7c5cbf" stroke-width="1.2"/>
  <text x="160" y="328" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#42207a">ローカル D1 / KV</text>
  <text x="160" y="344" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#7c5cbf">.wrangler/ (エミュ)</text>
  <text x="160" y="357" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#7c5cbf">壊しても本番に影響なし</text>

  <!-- note -->
  <rect x="32" y="382" width="296" height="50" rx="6" fill="#fef0ec" stroke="#dc6931" stroke-width="1"/>
  <text x="180" y="399" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#8a3010">⚠️ データはローカルのみ</text>
  <text x="180" y="415" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#8a3010">本番DBとは完全に別物（同期しない）</text>
  <text x="180" y="428" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#8a3010">deploy 時に --remote で別途マイグレーション</text>

  <!-- ===== RIGHT: PRODUCTION ===== -->
  <!-- panel -->
  <rect x="380" y="16" width="320" height="428" rx="12" fill="#f0faf8" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="380" y="16" width="320" height="38" rx="12" fill="#0d9488"/>
  <rect x="380" y="38" width="320" height="16" fill="#0d9488"/>
  <text x="540" y="40" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">本番環境（Cloudflare）</text>

  <!-- Browser box -->
  <rect x="450" y="68" width="180" height="44" rx="8" fill="#fff" stroke="#0d9488" stroke-width="1.2"/>
  <text x="540" y="87" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#085450">ブラウザ</text>
  <text x="540" y="103" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#0d9488">*.workers.dev</text>

  <!-- arrow to worker -->
  <line x1="540" y1="112" x2="540" y2="136" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="548" y="128" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6b6453">同一オリジン</text>

  <!-- Worker big box (unified) -->
  <rect x="400" y="137" width="280" height="148" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <rect x="400" y="137" width="280" height="28" rx="10" fill="#0f766e"/>
  <rect x="400" y="151" width="280" height="14" fill="#0f766e"/>
  <text x="540" y="155" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">Cloudflare Worker（1本）</text>

  <!-- Front inside worker -->
  <rect x="414" y="172" width="114" height="48" rx="6" fill="#fff" stroke="#0d9488" stroke-width="1"/>
  <text x="471" y="191" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="600" fill="#085450">フロント配信</text>
  <text x="471" y="207" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#0d9488">dist/ assets</text>
  <text x="471" y="219" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#0f766e">SPA fallback</text>

  <!-- Back inside worker -->
  <rect x="552" y="172" width="114" height="48" rx="6" fill="#fff" stroke="#d97706" stroke-width="1"/>
  <text x="609" y="191" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="600" fill="#7a3d00">API（Hono）</text>
  <text x="609" y="207" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#d97706">/api/*</text>
  <text x="609" y="219" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#a05c00">同一オリジン配信</text>

  <!-- CORS note inside -->
  <rect x="414" y="228" width="252" height="20" rx="4" fill="#d1fae5"/>
  <text x="540" y="241" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#065f46">✅ CORS 設定不要（同一オリジンのため）</text>
  <text x="540" y="253" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#065f46">※ ローカルはプロキシで回避、本番は不要</text>

  <!-- arrow to prod DB -->
  <line x1="540" y1="285" x2="540" y2="311" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Prod DB box -->
  <rect x="400" y="312" width="280" height="58" rx="8" fill="#fff3e2" stroke="#d97706" stroke-width="1.2"/>
  <text x="540" y="333" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="600" fill="#7a3d00">本番 D1 / KV</text>
  <text x="540" y="349" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#d97706">Cloudflare（リモート）</text>
  <text x="540" y="362" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#a05c00">deploy 前に db:migrate:remote が必要</text>

  <!-- note -->
  <rect x="392" y="382" width="296" height="50" rx="6" fill="#e6fafa" stroke="#0d9488" stroke-width="1"/>
  <text x="540" y="399" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#085450">本番デプロイの流れ</text>
  <text x="540" y="415" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#0d9488">build:front → db:migrate:remote → deploy</text>
  <text x="540" y="428" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#0f766e">npm run deploy で一発実行</text>

  <!-- center divider label -->
  <rect x="340" y="218" width="40" height="28" rx="8" fill="#6b6453"/>
  <text x="360" y="237" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">vs</text>
</svg>
