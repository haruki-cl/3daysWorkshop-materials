<svg width="100%" viewBox="0 0 720 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>技術スタック一覧</title>
  <desc>ワークショップで使う技術スタック: Claude Design, Claude Code, Vite+React+TS, Tailwind v4+shadcn, Hono, Cloudflare Workers, D1/KV, Vitest</desc>

  <rect width="720" height="340" rx="16" fill="#faf8f2"/>

  <!-- title -->
  <text x="360" y="34" text-anchor="middle" font-family="Hiragino Mincho ProN,Yu Mincho,serif" font-size="17" font-weight="700" fill="#0f766e">使う技術スタック</text>
  <line x1="160" y1="44" x2="560" y2="44" stroke="#c8a96a" stroke-width="1.5"/>

  <!-- ===== ROW 1 ===== -->

  <!-- Claude Design -->
  <g transform="translate(36,62)">
    <rect width="140" height="96" rx="10" fill="#eeeefe" stroke="#534ab7" stroke-width="1.2"/>
    <!-- icon: sparkle-like shape -->
    <circle cx="70" cy="34" r="18" fill="#534ab7" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">🎨</text>
    <text x="70" y="66" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#3c3489">Claude Design</text>
    <text x="70" y="82" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#534ab7">UI デザイン生成</text>
  </g>

  <!-- Claude Code -->
  <g transform="translate(196,62)">
    <rect width="140" height="96" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#0d9488" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">⌨️</text>
    <text x="70" y="66" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085450">Claude Code</text>
    <text x="70" y="82" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#0d9488">コーディングエージェント</text>
  </g>

  <!-- Vite + React + TS -->
  <g transform="translate(356,62)">
    <rect width="140" height="96" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#3a7bd5" opacity="0.15"/>
    <!-- vite bolt + react orbit simplified -->
    <text x="70" y="40" text-anchor="middle" font-size="20">⚡</text>
    <text x="70" y="62" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">Vite + React + TS</text>
    <text x="70" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">フロントエンド SPA</text>
    <text x="70" y="88" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">AI が最も得意なスタック</text>
  </g>

  <!-- Tailwind v4 + shadcn -->
  <g transform="translate(516,62)">
    <rect width="140" height="96" rx="10" fill="#e0f7f4" stroke="#0891b2" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#0891b2" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="20">🎨</text>
    <text x="70" y="62" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#0c4a6e">Tailwind v4</text>
    <text x="70" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0891b2">+ shadcn/ui</text>
    <text x="70" y="88" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0891b2">デザイン再現しやすい</text>
  </g>

  <!-- ===== ROW 2 ===== -->

  <!-- Hono -->
  <g transform="translate(36,176)">
    <rect width="140" height="96" rx="10" fill="#fff3e2" stroke="#d97706" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#d97706" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">🔥</text>
    <text x="70" y="66" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#7a3d00">Hono (TS)</text>
    <text x="70" y="82" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#d97706">軽量 Web フレームワーク</text>
  </g>

  <!-- Cloudflare Workers -->
  <g transform="translate(196,176)">
    <rect width="140" height="96" rx="10" fill="#fff7e6" stroke="#f6821f" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#f6821f" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">☁️</text>
    <text x="70" y="62" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#7c3a00">Cloudflare Workers</text>
    <text x="70" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#f6821f">無料枠で本番公開</text>
    <text x="70" y="88" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#f6821f">まで行ける</text>
  </g>

  <!-- D1 / KV -->
  <g transform="translate(356,176)">
    <rect width="140" height="96" rx="10" fill="#f0ebf8" stroke="#7c5cbf" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#7c5cbf" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">🗄️</text>
    <text x="70" y="62" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#42207a">D1 / KV</text>
    <text x="70" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#7c5cbf">DB（SQLite）＋ KV ストア</text>
    <text x="70" y="88" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#7c5cbf">Workers にビルトイン</text>
  </g>

  <!-- Vitest -->
  <g transform="translate(516,176)">
    <rect width="140" height="96" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/>
    <circle cx="70" cy="34" r="18" fill="#16a34a" opacity="0.15"/>
    <text x="70" y="40" text-anchor="middle" font-size="22">✅</text>
    <text x="70" y="62" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#14532d">Vitest</text>
    <text x="70" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#16a34a">+ vitest-pool-workers</text>
    <text x="70" y="88" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#16a34a">FE / BE 統一テスト</text>
  </g>

  <!-- Day 3 option label -->
  <rect x="36" y="284" width="648" height="40" rx="8" fill="#f5f2e8" stroke="#e7e1d3" stroke-width="1"/>
  <text x="116" y="301" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="700" fill="#6b6453">Day 3 オプション</text>
  <line x1="148" y1="296" x2="148" y2="316" stroke="#e7e1d3" stroke-width="1"/>

  <!-- option badges -->
  <rect x="160" y="289" width="62" height="24" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="0.8"/>
  <text x="191" y="305" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#991b1b">Resend</text>

  <rect x="232" y="289" width="56" height="24" rx="6" fill="#fdf2f8" stroke="#a855f7" stroke-width="0.8"/>
  <text x="260" y="305" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#7e22ce">Stripe</text>

  <rect x="298" y="289" width="52" height="24" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="0.8"/>
  <text x="324" y="305" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#1d4ed8">Clerk</text>

  <rect x="360" y="289" width="90" height="24" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="0.8"/>
  <text x="405" y="305" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="600" fill="#14532d">SonarQube</text>

  <text x="464" y="305" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#9ca3af">← やりたいものだけ・必須ではない</text>
</svg>
