<svg width="100%" viewBox="0 0 860 280" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Stripe 決済フロー図</title>
  <desc>ブラウザでの購入ボタン押下からStripe Checkout、Webhook処理、ライセンス表示までの7ステップフロー</desc>

  <defs>
    <!-- 青系（ユーザー側）矢印 -->
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- 紫系（Stripe側）矢印 -->
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6d45d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- ティール系（バック/DB側）矢印 -->
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- 折り返し矢印（ティール） -->
    <marker id="arr-wrap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="860" height="280" rx="16" fill="#faf8f2"/>

  <!-- タイトル -->
  <text x="430" y="28" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f766e">Stripe 決済フロー（7）</text>

  <!-- ========== 上段: ステップ 1→2→3→4 ========== -->

  <!-- Step 1: ブラウザ（ユーザー） -->
  <rect x="18" y="55" width="108" height="62" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="72" y="78" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">ブラウザ</text>
  <text x="72" y="92" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#3a7bd5">（ユーザー）</text>
  <text x="72" y="108" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">「購入」ボタン押下</text>

  <!-- 矢印 1→2 -->
  <line x1="126" y1="86" x2="154" y2="86" stroke="#3a7bd5" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- Step 2: Hono API -->
  <rect x="156" y="55" width="118" height="62" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="215" y="78" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">Hono API</text>
  <text x="215" y="93" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">POST /api/checkout</text>
  <text x="215" y="108" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8.5" fill="#1a4a80">Checkout Session 生成</text>

  <!-- 矢印 2→3 -->
  <line x1="274" y1="86" x2="302" y2="86" stroke="#6d45d4" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Step 3: Stripe Checkout -->
  <rect x="304" y="55" width="120" height="62" rx="10" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.5"/>
  <text x="364" y="78" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#3b1a8a">Stripe Checkout</text>
  <text x="364" y="93" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6d45d4">テストカード入力</text>
  <text x="364" y="108" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#6d45d4">4242 4242 4242 4242</text>

  <!-- 矢印 3→4 -->
  <line x1="424" y1="86" x2="452" y2="86" stroke="#6d45d4" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Step 4: Stripe Webhook -->
  <rect x="454" y="55" width="120" height="62" rx="10" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.5"/>
  <text x="514" y="78" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#3b1a8a">Stripe Webhook</text>
  <text x="514" y="93" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#6d45d4">POST /webhook/stripe</text>
  <text x="514" y="108" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8.5" fill="#3b1a8a">支払い完了イベント</text>

  <!-- ========== 折り返し矢印（上段右端→下段右端）========== -->
  <!-- 右端のStep4から下段Step5へ折り返し -->
  <path d="M574 86 Q620 86 620 130 Q620 174 594 174" fill="none" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arr-wrap)"/>

  <!-- ========== 下段: ステップ 5→6→7（右→左方向）========== -->

  <!-- Step 5: Hono + D1 -->
  <rect x="454" y="150" width="136" height="62" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="522" y="173" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">Hono + D1</text>
  <text x="522" y="188" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8.5" fill="#0d9488">署名検証 + ライセンス保存</text>
  <text x="522" y="203" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#0d9488">INSERT INTO licenses</text>

  <!-- 矢印 5→6（右→左） -->
  <line x1="454" y1="181" x2="426" y2="181" stroke="#3a7bd5" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- Step 6: ブラウザ /success -->
  <rect x="296" y="150" width="126" height="62" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="359" y="173" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">ブラウザ</text>
  <text x="359" y="188" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">successページへ</text>
  <text x="359" y="203" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">redirect /success</text>

  <!-- 矢印 6→7（右→左） -->
  <line x1="296" y1="181" x2="268" y2="181" stroke="#0d9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>

  <!-- Step 7: マイページ -->
  <rect x="140" y="150" width="124" height="62" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="202" y="173" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">マイページ</text>
  <text x="202" y="188" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0d9488">ライセンスキー表示</text>
  <text x="202" y="203" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#0d9488">GET /api/me</text>

  <!-- ========== ステップ番号バッジ ========== -->
  <!-- Step 1 -->
  <circle cx="28" cy="62" r="9" fill="#3a7bd5"/>
  <text x="28" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">1</text>
  <!-- Step 2 -->
  <circle cx="166" cy="62" r="9" fill="#3a7bd5"/>
  <text x="166" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">2</text>
  <!-- Step 3 -->
  <circle cx="314" cy="62" r="9" fill="#6d45d4"/>
  <text x="314" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">3</text>
  <!-- Step 4 -->
  <circle cx="464" cy="62" r="9" fill="#6d45d4"/>
  <text x="464" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">4</text>
  <!-- Step 5 -->
  <circle cx="464" cy="157" r="9" fill="#0d9488"/>
  <text x="464" y="161" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">5</text>
  <!-- Step 6 -->
  <circle cx="306" cy="157" r="9" fill="#3a7bd5"/>
  <text x="306" y="161" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">6</text>
  <!-- Step 7 -->
  <circle cx="150" cy="157" r="9" fill="#0d9488"/>
  <text x="150" y="161" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">7</text>

  <!-- ========== 凡例 ========== -->
  <rect x="640" y="55" width="200" height="158" rx="10" fill="#f5f2e8" stroke="#d4cdb8" stroke-width="1"/>
  <text x="740" y="74" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5a5040">凡例</text>

  <rect x="656" y="84" width="14" height="14" rx="3" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.2"/>
  <text x="678" y="95" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#1a4a80">ユーザー側（ブラウザ）</text>

  <rect x="656" y="106" width="14" height="14" rx="3" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.2"/>
  <text x="678" y="117" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3b1a8a">Stripe サービス</text>

  <rect x="656" y="128" width="14" height="14" rx="3" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
  <text x="678" y="139" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#085450">バックエンド / DB</text>

  <line x1="656" y1="157" x2="670" y2="157" stroke="#0d9488" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="678" y="161" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#085450">折り返し（段間）</text>

  <!-- 補足テキスト -->
  <rect x="656" y="170" width="176" height="34" rx="5" fill="#faf8f2" stroke="#c9c0a8" stroke-width="0.8"/>
  <text x="744" y="183" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#6b6453">上段: ① → ② → ③ → ④</text>
  <text x="744" y="196" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#6b6453">下段: ⑤ ← ⑥ ← ⑦（右→左）</text>

  <!-- 下部注記 -->
  <rect x="18" y="228" width="600" height="22" rx="6" fill="#f5f2e8"/>
  <text x="318" y="243" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6b6453">⚠️ <tspan font-weight="700" fill="#8a3010">STRIPE_SECRET_KEY・STRIPE_WEBHOOK_SECRET は .dev.vars に記載</tspan> — コードに直書きしない</text>
</svg>
