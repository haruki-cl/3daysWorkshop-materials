<svg width="100%" viewBox="0 0 720 300" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>フロント・バック統合図（開発時 vs 本番）</title>
  <desc>開発時も本番も Worker 一本。ローカルは build:front で作った dist/ を wrangler dev が API と一緒に1ポートで配信し、本番は Cloudflare 上で同じ構成になる。</desc>

  <defs>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="720" height="300" rx="16" fill="#faf8f2"/>

  <!-- title -->
  <text x="360" y="30" text-anchor="middle" font-family="Hiragino Mincho ProN,Yu Mincho,serif" font-size="16" font-weight="700" fill="#0f766e">フロント・バック構成（開発時 vs 本番）</text>

  <!-- ===== LEFT: 開発時（統合・Worker 1本） ===== -->
  <rect x="16" y="48" width="328" height="238" rx="12" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="180" y="70" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#1a4a80">開発時（ローカル）</text>

  <!-- Browser -->
  <rect x="28" y="96" width="80" height="44" rx="8" fill="#fff" stroke="#3a7bd5" stroke-width="1.2"/>
  <text x="68" y="114" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">ブラウザ</text>
  <text x="68" y="129" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#3a7bd5">localhost:auto</text>

  <!-- Arrow browser to wrangler dev -->
  <line x1="108" y1="118" x2="134" y2="118" stroke="#3a7bd5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- wrangler dev Worker box (unified) -->
  <rect x="136" y="86" width="196" height="128" rx="10" fill="#fff" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="234" y="106" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">wrangler dev（Worker 1本）</text>
  <line x1="150" y1="112" x2="318" y2="112" stroke="#dbeafe" stroke-width="1"/>

  <!-- assets (dev) -->
  <rect x="150" y="118" width="168" height="38" rx="6" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1"/>
  <text x="234" y="134" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a4a80">静的アセット（[assets]）</text>
  <text x="234" y="147" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">build:front → dist/ を配信</text>

  <!-- api routes (dev) -->
  <rect x="150" y="160" width="168" height="38" rx="6" fill="#fff7e6" stroke="#d97706" stroke-width="1"/>
  <text x="234" y="176" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#7a3d00">API ルート（Hono）</text>
  <text x="234" y="189" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#d97706">/api/* → hono handler</text>

  <!-- Arrow Worker to D1/KV local -->
  <line x1="234" y1="214" x2="234" y2="230" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- D1/KV local -->
  <rect x="146" y="230" width="176" height="36" rx="8" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
  <text x="234" y="246" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="700" fill="#085450">D1 / KV</text>
  <text x="234" y="259" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#0d9488">ローカル miniflare</text>

  <!-- key point (dev) -->
  <rect x="28" y="150" width="98" height="52" rx="6" fill="#e0fdf4" stroke="#0d9488" stroke-width="0.8"/>
  <text x="77" y="168" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#085450">本番と同じ</text>
  <text x="77" y="181" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#085450">1プロセス構成</text>
  <text x="77" y="194" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#0d9488">プロキシ不要</text>

  <!-- ===== SEPARATOR ===== -->
  <line x1="360" y1="56" x2="360" y2="276" stroke="#c8a96a" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="360" y="292" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#9a8060">VS</text>

  <!-- ===== RIGHT: 本番 ===== -->
  <rect x="376" y="48" width="328" height="238" rx="12" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="540" y="70" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="12" font-weight="700" fill="#085450">本番（Cloudflare）</text>

  <!-- Browser prod -->
  <rect x="390" y="84" width="88" height="48" rx="8" fill="#fff" stroke="#0d9488" stroke-width="1.2"/>
  <text x="434" y="106" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">ブラウザ</text>
  <text x="434" y="122" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9" fill="#0d9488">*.workers.dev</text>

  <!-- Arrow browser to Worker -->
  <line x1="478" y1="108" x2="506" y2="108" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- Worker box (big) -->
  <rect x="506" y="76" width="180" height="140" rx="10" fill="#fff" stroke="#0d9488" stroke-width="1.5"/>
  <text x="596" y="98" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">Cloudflare Worker</text>
  <line x1="520" y1="104" x2="672" y2="104" stroke="#e7e1d3" stroke-width="1"/>

  <!-- assets -->
  <rect x="520" y="112" width="148" height="36" rx="6" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1"/>
  <text x="594" y="128" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#1a4a80">静的アセット（[assets]）</text>
  <text x="594" y="141" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">dist/ → SPA 配信</text>

  <!-- api routes -->
  <rect x="520" y="156" width="148" height="36" rx="6" fill="#fff7e6" stroke="#d97706" stroke-width="1"/>
  <text x="594" y="172" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#7a3d00">API ルート（Hono）</text>
  <text x="594" y="185" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#d97706">/api/* → hono handler</text>

  <!-- Arrow Worker to D1/KV prod -->
  <line x1="596" y1="216" x2="596" y2="238" stroke="#0d9488" stroke-width="1.5" marker-end="url(#arr-teal)"/>

  <!-- D1/KV prod -->
  <rect x="506" y="238" width="180" height="36" rx="8" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
  <text x="596" y="254" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="700" fill="#085450">D1 / KV（本番）</text>
  <text x="596" y="267" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#0d9488">リモート マイグレーション済み</text>

  <!-- key point label -->
  <rect x="390" y="196" width="108" height="50" rx="6" fill="#e0fdf4" stroke="#0d9488" stroke-width="0.8"/>
  <text x="444" y="214" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#085450">CORS なし・</text>
  <text x="444" y="227" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" font-weight="700" fill="#085450">プロキシ不要</text>
  <text x="444" y="240" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#0d9488">Worker 1本で完結</text>
</svg>
