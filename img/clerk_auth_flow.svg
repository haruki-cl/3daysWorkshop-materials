<svg width="100%" viewBox="0 0 860 320" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>ID 連携（Clerk）のしくみ</title>
  <desc>未ログインのマイページアクセスからGoogle SSOサインイン、トークン発行、API呼び出し時のバックエンドでのトークン検証までの6ステップフロー</desc>

  <defs>
    <!-- 青系（ユーザー側）矢印 -->
    <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3a7bd5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- 紫系（Clerk側）矢印 -->
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6d45d4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- ティール系（バック側）矢印 -->
    <marker id="arr-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="860" height="320" rx="16" fill="#faf8f2"/>

  <!-- タイトル -->
  <text x="430" y="28" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f766e">ID 連携（Clerk）のしくみ — ログインから API 保護まで</text>

  <!-- ========== 上段: ステップ 1→2→3→4 ========== -->

  <!-- Step 1: ブラウザ（未ログイン） -->
  <rect x="18" y="55" width="122" height="66" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="79" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">ブラウザ</text>
  <text x="79" y="92" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">未ログインで /mypage</text>
  <text x="79" y="107" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">→ サインインへ誘導</text>

  <!-- 矢印 1→2 -->
  <line x1="140" y1="88" x2="166" y2="88" stroke="#6d45d4" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Step 2: Clerk サインイン -->
  <rect x="168" y="55" width="134" height="66" rx="10" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.5"/>
  <text x="235" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#3b1a8a">Clerk サインイン画面</text>
  <text x="235" y="92" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6d45d4">Continue with Google</text>
  <text x="235" y="107" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6d45d4">（Google SSO で認証）</text>

  <!-- 矢印 2→3 -->
  <line x1="302" y1="88" x2="328" y2="88" stroke="#6d45d4" stroke-width="1.8" marker-end="url(#arr-purple)"/>

  <!-- Step 3: Clerk トークン発行 -->
  <rect x="330" y="55" width="134" height="66" rx="10" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.5"/>
  <text x="397" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#3b1a8a">Clerk</text>
  <text x="397" y="92" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6d45d4">トークン（JWT）を発行</text>
  <text x="397" y="107" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#6d45d4">→ フロントが保持</text>

  <!-- 矢印 3→4 -->
  <line x1="464" y1="88" x2="490" y2="88" stroke="#3a7bd5" stroke-width="1.8" marker-end="url(#arr-blue)"/>

  <!-- Step 4: API 呼び出し -->
  <rect x="492" y="55" width="140" height="66" rx="10" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.5"/>
  <text x="562" y="76" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1a4a80">API 呼び出し</text>
  <text x="562" y="92" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#3a7bd5">GET /api/me</text>
  <text x="562" y="107" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3a7bd5">トークンを添えて送る</text>

  <!-- ========== 折り返し矢印（上段右端→下段右端）========== -->
  <path d="M632 88 Q668 88 668 135 Q668 182 646 182" fill="none" stroke="#0d9488" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#arr-teal)"/>

  <!-- ========== 下段: ステップ 5→6（右→左方向）========== -->

  <!-- Step 5: バックで検証 -->
  <rect x="478" y="152" width="166" height="66" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="561" y="173" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">Hono（バック）で検証</text>
  <text x="561" y="189" text-anchor="middle" font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="8" fill="#0d9488">@hono/clerk-auth</text>
  <text x="561" y="204" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0d9488">本物のトークンか・期限内か</text>

  <!-- 矢印 5→6（右→左） -->
  <line x1="478" y1="185" x2="452" y2="185" stroke="#0d9488" stroke-width="1.8" marker-end="url(#arr-teal)"/>

  <!-- Step 6: 結果 -->
  <rect x="256" y="152" width="194" height="66" rx="10" fill="#e6fafa" stroke="#0d9488" stroke-width="1.5"/>
  <text x="353" y="173" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="11" font-weight="700" fill="#085450">検証結果で出し分け</text>
  <text x="353" y="189" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0d9488">OK → email で D1 を引いて情報を返す</text>
  <text x="353" y="204" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#0d9488">NG → 401（未認証）を返す</text>

  <!-- ========== ステップ番号バッジ ========== -->
  <circle cx="28" cy="62" r="9" fill="#3a7bd5"/>
  <text x="28" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">1</text>
  <circle cx="178" cy="62" r="9" fill="#6d45d4"/>
  <text x="178" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">2</text>
  <circle cx="340" cy="62" r="9" fill="#6d45d4"/>
  <text x="340" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">3</text>
  <circle cx="502" cy="62" r="9" fill="#3a7bd5"/>
  <text x="502" y="66" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">4</text>
  <circle cx="488" cy="159" r="9" fill="#0d9488"/>
  <text x="488" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">5</text>
  <circle cx="266" cy="159" r="9" fill="#0d9488"/>
  <text x="266" y="163" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#fff">6</text>

  <!-- ========== 凡例 ========== -->
  <rect x="692" y="55" width="150" height="163" rx="10" fill="#f5f2e8" stroke="#d4cdb8" stroke-width="1"/>
  <text x="767" y="74" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" font-weight="700" fill="#5a5040">凡例</text>

  <rect x="706" y="86" width="14" height="14" rx="3" fill="#eaf3fb" stroke="#3a7bd5" stroke-width="1.2"/>
  <text x="728" y="97" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#1a4a80">ユーザー側</text>

  <rect x="706" y="110" width="14" height="14" rx="3" fill="#f3eeff" stroke="#6d45d4" stroke-width="1.2"/>
  <text x="728" y="121" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#3b1a8a">Clerk サービス</text>

  <rect x="706" y="134" width="14" height="14" rx="3" fill="#e6fafa" stroke="#0d9488" stroke-width="1.2"/>
  <text x="728" y="145" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="9" fill="#085450">バックエンド</text>

  <text x="706" y="170" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#6b6453">上段: ① → ② → ③ → ④</text>
  <text x="706" y="184" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="8" fill="#6b6453">下段: ⑤ ← ⑥（右→左）</text>

  <!-- 下部注記 -->
  <rect x="18" y="240" width="824" height="60" rx="8" fill="#f5f2e8"/>
  <text x="430" y="264" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#5a5040">Day 2 のモック認証は「<tspan font-family="SFMono-Regular,Menlo,Consolas,monospace" font-size="9">x-user-email</tspan> ヘッダを<tspan font-weight="700">検証せず信頼</tspan>」していた（誰でも名乗れる）。</text>
  <text x="430" y="284" text-anchor="middle" font-family="Hiragino Kaku Gothic ProN,Yu Gothic,system-ui,sans-serif" font-size="10" fill="#5a5040">[9] のゴールはこれを<tspan font-weight="700" fill="#085450">⑤のトークン検証に差し替える</tspan>こと。検証はバックで行う（フロントの出し分けだけでは保護にならない）。</text>
</svg>
